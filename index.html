<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<!-- libsodium: raw lib first, then wrappers -->
<script src="sodium.js"></script>
<script src="sodium-wrappers.js"></script>
<!-- Go WASM runtime -->
<script src="api/script.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px; background: #000;
}
#loader-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: opacity .6s ease; opacity: 0;
}
.spinner {
  position: relative; z-index: 1;
  width: 72px; height: 72px;
  border: 5px solid rgba(255,255,255,.15);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { position: relative; z-index: 1; font-size: .95rem; color: rgba(255,255,255,.6); letter-spacing: .04em; text-shadow: 0 1px 4px #000; }

#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; }

#usage {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  background: #000; gap: 10px;
}
#usage p { font-size: 1.05rem; color: rgba(255,255,255,.65); line-height: 2; }

#err {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; background: #000;
}
#err-title { font-size: 2.4rem; font-weight: 700; color: #fff; margin-bottom: 18px; }
#err-link { font-size: 1.1rem; color: #60a5fa; text-decoration: underline; cursor: pointer; }
#err-link:hover { color: #93c5fd; }
#err-detail {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-size: .78rem; color: rgba(255,255,255,.35); white-space: nowrap;
  max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Stream</span><br><br>
    <code style="color:rgba(255,255,255,.8)">?id=550</code> &nbsp;— movie<br>
    <code style="color:rgba(255,255,255,.8)">?id=456&amp;s=1&amp;e=1</code> &nbsp;— TV episode
  </p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try vidsrc.xyz instead?</a>
  <div id="err-detail"></div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline></video>
</div>



<script>
var TMDB_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';
// Public CORS proxy for HLS stream proxying (supports custom headers)
var CORS_PROXY = 'https://vaporized.help/v1/proxy?data=';

function proxyUrl(url, extraHeaders) {
  var headers = Object.assign({
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150 Safari/537.36',
    'Referer': 'https://vidlink.pro/',
    'Origin': 'https://vidlink.pro'
  }, extraHeaders || {});
  return CORS_PROXY + encodeURIComponent(JSON.stringify({ url: url, headers: headers }));
}

var MESSAGES = [
  'Loading stream...', 'Contacting the mothership...', 'Bribing the servers...',
  'Untangling the cables...', 'Asking nicely...', 'Decoding the matrix...',
  'Warming up the hamsters...', 'Negotiating with the cloud...', 'Almost there...',
  'Convincing pixels to move...', 'Poking the API...', 'Summoning bandwidth...',
  'Greasing the pipes...', 'Waking up the interns...', 'Stealing the stream (legally)...'
];
var msgEl = document.getElementById('loader-text');
var msgIdx = 0;
var msgTimer = setInterval(function() {
  msgIdx = (msgIdx + 1) % MESSAGES.length;
  msgEl.textContent = MESSAGES[msgIdx];
}, 2200);

var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');

function showPlayer() {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player').style.display = 'block';
}

function showErr(msg) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
  var vidsrcUrl = s
    ? 'https://vidsrc.xyz/embed/tv?tmdb=' + id + '&season=' + s + '&episode=' + (e || '1')
    : 'https://vidsrc.xyz/embed/movie?tmdb=' + id;
  document.getElementById('err-link').href = vidsrcUrl;
}

function loadBackdrop(id, isTv) {
  var type = isTv ? 'tv' : 'movie';
  fetch('https://api.themoviedb.org/3/' + type + '/' + id + '?api_key=' + TMDB_KEY)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var img = d.backdrop_path || d.poster_path;
      if (!img) return;
      var url = 'https://wsrv.nl/?url=' + encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img) + '&bg=black&blur=3';
      var bg = document.getElementById('loader-bg');
      var preload = new Image();
      preload.onload = function() { bg.style.backgroundImage = 'url(' + url + ')'; bg.style.opacity = '1'; };
      preload.src = url;
    })
    .catch(function() {});
}

// ── Stream lookup via vaporized proxy (fully client-side) ────────────────────
async function getStream(id, season, episode) {
  // Load WASM + sodium in browser to get the token
  await bootWasm();
  const token = globalThis.getAdv(String(id));
  if (!token) throw new Error('getAdv returned null');

  const apiUrl = season
    ? `https://vidlink.pro/api/b/tv/${token}/${season}/${episode || 1}?multiLang=0`
    : `https://vidlink.pro/api/b/movie/${token}?multiLang=0`;

  const res = await fetch(proxyUrl(apiUrl));
  if (!res.ok) throw new Error(`vidlink API returned ${res.status}`);
  const data = await res.json();
  const playlist = data?.stream?.playlist;
  if (!playlist) throw new Error('No playlist in response');
  return playlist;
}

// ── WASM boot (runs in browser) ───────────────────────────────────────────────
var bootPromise = null;
function bootWasm() {
  if (bootPromise) return bootPromise;
  bootPromise = (async () => {
    // sodium.js sets window.libsodium, sodium-wrappers.js sets window.sodium
    if (!globalThis.sodium) throw new Error('libsodium not loaded');
    await globalThis.sodium.ready;

    const go = new Dm();
    const wasmBuf = await fetch('api/fu.wasm').then(r => r.arrayBuffer());
    const { instance } = await WebAssembly.instantiate(wasmBuf, go.importObject);
    go.run(instance);

    await new Promise(r => setTimeout(r, 500));
    if (typeof globalThis.getAdv !== 'function') throw new Error('getAdv not found after WASM boot');
  })();
  return bootPromise;
}

// Extract the real URL from a vaporized proxied URL (or return as-is)
function realUrl(url) {
  if (!url.startsWith('https://vaporized.help')) return url;
  try {
    const data = JSON.parse(decodeURIComponent(new URL(url).searchParams.get('data')));
    return data.url;
  } catch { return url; }
}

// Rewrite m3u8 segment URLs — realBase is the actual CDN URL
function rewriteM3u8(body, realBase) {
  const base = realBase.split('?')[0];
  const baseDir = base.substring(0, base.lastIndexOf('/') + 1);
  const origin = new URL(realBase).origin;
  return body.split('\n').map(line => {
    const t = line.trim();
    if (!t || t.startsWith('#')) return line;
    // Resolve relative URLs against the real base
    const abs = t.startsWith('http') ? t : t.startsWith('/') ? origin + t : baseDir + t;
    return abs; // return as-is — vidlink's CDN proxy handles its own segments
  }).join('\n');
}

// HLS loader — vidlink playlist URLs are already proxied by their CDN, no need to re-wrap
function makeProxyLoader(HlsLib) {
  const DefaultLoader = HlsLib.DefaultConfig.loader;
  return class ProxyLoader extends DefaultLoader {
    load(context, config, callbacks) {
      const origUrl = context.url;
      const real = realUrl(origUrl);
      const isM3u8 = /\.m3u8?(\?|$)/i.test(real.split('?')[0]) ||
                     real.includes('m3u8') || real.includes('mpegurl');

      const origOnSuccess = callbacks.onSuccess;
      callbacks.onSuccess = (response, stats, ctx, networkDetails) => {
        if (isM3u8 && typeof response.data === 'string') {
          response.data = rewriteM3u8(response.data, real);
        }
        origOnSuccess(response, stats, ctx, networkDetails);
      };

      super.load(context, config, callbacks);
    }
  };
}

// ── Main ──────────────────────────────────────────────────────────────────────
if (!id) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  loadBackdrop(id, !!s);
  getStream(id, s, e)
    .then(function(url) { play(url); })
    .catch(function(err) { showErr(err.message); });
}

function play(rawUrl) {
  var v = document.getElementById('v');
  if (Hls.isSupported()) {
    var hls = new Hls({
      enableWorker: true,
      loader: makeProxyLoader(Hls)
    });
    hls.loadSource(rawUrl);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      showPlayer();
      v.play().catch(function(){});
    });
    hls.on(Hls.Events.ERROR, function(_, d) {
      if (d.fatal) showErr(d.details || 'HLS fatal error');
    });
  } else {
    v.src = rawUrl;
    v.addEventListener('canplay', showPlayer, { once: true });
    v.play().catch(function(err) { showErr(err.message); });
  }
}
</script>
</body>
</html>
